<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sec</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glow: 0 0 20px rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            font-family: 'Lexend', sans-serif;
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            background-color: #000000;
        }

        #star-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        .bg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.3); z-index: -1; }

        /* Cursor */
        .cursor-dot, .cursor-trail { position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); }
        .cursor-dot { width: 6px; height: 6px; background: #fff; box-shadow: 0 0 10px #fff; }
        .cursor-trail { width: 24px; height: 24px; border: 1px solid rgba(255, 255, 255, 0.5); transition: left 0.1s ease-out, top 0.1s ease-out; }

        /* Entry Screen */
        #entry-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .click-text { letter-spacing: 4px; text-transform: uppercase; animation: pulseText 2s infinite; color: #fff; }
        @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Card */
        .main-container {
            display: flex; justify-content: center; align-items: center; height: 100%;
            opacity: 0; transform: translateY(20px); transition: opacity 1s ease 0.3s, transform 1s ease 0.3s;
        }
        .main-container.visible { opacity: 1; transform: translateY(0); }
        .profile-card {
            width: 90%; max-width: 380px; background: var(--glass-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 40px 30px; text-align: center;
        }

        .avatar-container { width: 110px; height: 110px; margin: 0 auto 20px; border-radius: 50%; padding: 3px; background: rgba(255, 255, 255, 0.1); box-shadow: var(--glow); }
        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255, 255, 255, 0.1); }
        .name { font-size: 1.5rem; font-weight: 600; margin-bottom: 12px; }
        .badges { display: flex; justify-content: center; gap: 8px; margin-bottom: 30px; flex-wrap: wrap; }
        .badge { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; color: #ddd; }
        
        .links { display: flex; flex-direction: column; gap: 12px; }
        .link-btn { padding: 14px; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; color: #fff; text-decoration: none; transition: 0.3s; }
        .link-btn:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }

        /* Music Player */
        .music-player { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 300px; opacity: 0; transition: 1s ease 0.6s; }
        .music-player.visible { opacity: 1; }
        .audio-controls { display: flex; align-items: center; justify-content: space-between; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 20px; border-radius: 50px; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-trail" id="cursor-trail"></div>

    <div id="entry-screen">
        <div class="click-text">[ click to enter ]</div>
    </div>

    <canvas id="star-canvas"></canvas>
    <div class="bg-overlay"></div>

    <div class="main-container" id="main-content">
        <div class="profile-card">
            <div class="avatar-container">
                <img class="avatar" src="https://cdn.discordapp.com/attachments/1413912191530438859/1484221048294473779/1fafe446dcbd802b56cdde6bda1260a6.jpg?ex=69bd7011&is=69bc1e91&hm=7b3e3e8011e3b68814c73d28dbfa50655d6f0ab57d3d3041c67ae42047a5499e&" alt="Profile">
            </div>
            <h1 class="name">SKYE PERO MABAIT</h1>
            <div class="badges">
                <div class="badge"><i class="fa-solid fa-code"></i> Developer</div>
                <div class="badge"><i class="fa-solid fa-location-dot"></i> Philippines</div>
                <div class="badge"><i class="fa-solid fa-user"></i> 14y/o</div>
            </div>
            <div class="links">
                <a href="#" class="link-btn"><i class="fa-brands fa-discord"></i> Discord</a>
                <a href="https://github.com/fwxxsk" class="link-btn"><i class="fa-brands fa-github"></i> GitHub</a>
                <a href="#" class="link-btn"><i class="fa-brands fa-telegram"></i> Telegram</a>
            </div>
        </div>
    </div>

    <div class="music-player" id="music-player">
        <div class="audio-controls" id="music-toggle">
            <i class="fa-solid fa-play" id="play-icon"></i>
            <span class="song-title">Teka Lang - Emman</span>
            <i class="fa-solid fa-music"></i>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="EMMAN_-_Teka_Lang_8D_MUZYKA_(mp3.pm) (1).mp3" type="audio/mpeg">
    </audio>

    <script>
        const entryScreen = document.getElementById('entry-screen');
        const mainContent = document.getElementById('main-content');
        const musicPlayer = document.getElementById('music-player');
        const audio = document.getElementById('bg-music');
        const playIcon = document.getElementById('play-icon');
        const musicToggle = document.getElementById('music-toggle');

        // Entry + Play Music
        entryScreen.addEventListener('click', () => {
            entryScreen.style.opacity = '0';
            audio.play().catch(() => console.log("User interaction needed"));
            setTimeout(() => {
                entryScreen.style.visibility = 'hidden';
                mainContent.classList.add('visible');
                musicPlayer.classList.add('visible');
                playIcon.classList.replace('fa-play', 'fa-pause');
            }, 800);
        });

        // Play/Pause Toggle
        musicToggle.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playIcon.classList.replace('fa-play', 'fa-pause');
            } else {
                audio.pause();
                playIcon.classList.replace('fa-pause', 'fa-play');
            }
        });

        // Cursor Logic
        const dot = document.getElementById('cursor-dot');
        const trail = document.getElementById('cursor-trail');
        document.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
            setTimeout(() => {
                trail.style.left = e.clientX + 'px';
                trail.style.top = e.clientY + 'px';
            }, 40);
        });

        // Star Background
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();
        for(let i = 0; i < 150; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.5, v: Math.random() * 0.5 });
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
                s.y += s.v; if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
