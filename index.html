<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sec</title>

<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --text-main: #fff;
    --text-muted: #aaa;
    --glass-bg: rgba(255,255,255,0.03);
    --glass-border: rgba(255,255,255,0.08);
}

* {margin:0;padding:0;box-sizing:border-box;cursor:none;}

body {
    font-family: 'Lexend', sans-serif;
    background: #000;
    color: #fff;
    overflow: hidden;
}

/* ENTER */
#enter-screen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}
#enter-screen button {
    padding: 15px 35px;
    border-radius: 30px;
    border: none;
    font-weight: 600;
}

/* CARD */
.card {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0.9);
    opacity: 0;
    padding: 30px;
    width: 260px;
    border-radius: 20px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(15px);
    text-align: center;
    transition: 0.5s;
}
.card.show {
    opacity: 1;
    transform: translate(-50%,-50%) scale(1);
}

.profile-img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 10px;
}

.name {font-size:18px;font-weight:600;margin-bottom:10px;}

.btn {
    display:block;
    margin:8px 0;
    padding:12px;
    border-radius:12px;
    text-decoration:none;
    color:#fff;
    background:rgba(255,255,255,0.05);
    transition:0.2s;
}
.btn:hover {
    background:rgba(255,255,255,0.15);
    transform:scale(1.05);
}

/* CURSOR */
.cursor-dot,.cursor-trail{
    position:fixed;
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:9999;
}
.cursor-dot{width:6px;height:6px;background:#fff;}
.cursor-trail{width:30px;height:30px;border:1px solid rgba(255,255,255,0.4);}

/* BG */
canvas{position:fixed;width:100%;height:100%;z-index:-1;}
</style>
</head>

<body>

<div id="enter-screen">
    <button>Enter</button>
</div>

<canvas id="star"></canvas>

<div class="card" id="card">
    <img src="./587d67c5ed066bed847b5427191e87f4.jpg" class="profile-img">

    <div class="name">sec</div>

    <a href="https://discord.com/channels/@me" target="_blank" class="btn">
        <i class="fab fa-discord"></i> Discord (911sec)
    </a>

    <a href="https://github.com/fwxxsk" target="_blank" class="btn">
        <i class="fab fa-github"></i> GitHub
    </a>

    <a href="https://t.me/sleepysec" target="_blank" class="btn">
        <i class="fab fa-telegram"></i> Telegram
    </a>
</div>

<div class="cursor-dot"></div>
<div class="cursor-trail"></div>

<!-- YOUTUBE MUSIC -->
<iframe id="yt"
width="0" height="0"
src="https://www.youtube.com/embed/J8SGtl9Dj6w?autoplay=0&loop=1&playlist=J8SGtl9Dj6w"
allow="autoplay">
</iframe>

<script>
// ENTER + MUSIC
const btn = document.querySelector("#enter-screen button");
const screen = document.getElementById("enter-screen");
const card = document.getElementById("card");
const yt = document.getElementById("yt");

btn.onclick = () => {
    yt.src = "https://www.youtube.com/embed/J8SGtl9Dj6w?autoplay=1&loop=1&playlist=J8SGtl9Dj6w";
    screen.style.display = "none";
    card.classList.add("show");
};

// CURSOR
let mx=0,my=0,tx=0,ty=0;
const dot=document.querySelector(".cursor-dot");
const trail=document.querySelector(".cursor-trail");

document.addEventListener("mousemove",e=>{
    mx=e.clientX; my=e.clientY;
});

function animate(){
    tx+=(mx-tx)*0.15;
    ty+=(my-ty)*0.15;

    dot.style.left=mx+"px";
    dot.style.top=my+"px";
    trail.style.left=tx+"px";
    trail.style.top=ty+"px";

    requestAnimationFrame(animate);
}
animate();

// STARS
const c=document.getElementById("star");
const ctx=c.getContext("2d");

function resize(){
    c.width=innerWidth;
    c.height=innerHeight;
}
resize();
window.onresize=resize;

let stars=[];
for(let i=0;i<100;i++){
    stars.push({
        x:Math.random()*c.width,
        y:Math.random()*c.height,
        r:Math.random()*1.5,
        s:Math.random()*0.3
    });
}

function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    ctx.fillStyle="#fff";

    stars.forEach(s=>{
        s.y+=s.s;
        if(s.y>c.height)s.y=0;

        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
