        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            margin-bottom: 10px;
            text-shadow: 0 0 20px #00ff88;
        }
        .subtitle { font-size: 1.1em; opacity: 0.9; color: #ccc; }

        .music-status {

            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%,50%{opacity:1;} 51%,100%{opacity:0.3;} }

        /* Ops Section */

            background: rgba(255,0,0,0.1); border: 2px solid #ff4444;

        }
        .ops-title { font-family: 'Orbitron'; font-size: 1.8em; text-align: center; margin-bottom: 25px; color: #ff4444; }
        .target-box {

            border: 1px solid #ff4444; font-family: 'Fira Code';
            font-size: 1.1em; text-align: center; margin-bottom: 20px;
        }
        .target-phone { font-size: 1.5em; color: #ff6666; font-weight: bold; }
        .status-bar {
            display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;
            font-size: 0.95em; color: #ffcc00;
        }
        .status-item { background: rgba(255,204,0,0.2); padding: 8px 15px; border-radius: 20px; }
        
        /* Repo Links */
        .repo-section {
            max-width: 800px; margin: 40px auto; padding: 30px;
            background: rgba(0,0,0,0.7); border: 1px solid #00ff88;
            border-radius: 15px; backdrop-filter: blur(10px);
        }
        .repo-title { font-family: 'Orbitron'; font-size: 1.8em; text-align: center; margin-bottom: 25px; color: #00ff88; }
        .repo-list {
            list-style: none; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }
        .repo-item {
            background: rgba(0,255,136,0.1); padding: 20px; border-radius: 10px;
            border-left: 4px solid #00ff88; transition: all 0.3s;
        }
        .repo-item:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,255,136,0.3); }
        .repo-link {
            color: #00ff88; text-decoration: none; font-weight: 500;
            font-size: 1.1em;
        }
        .repo-link:hover { text-decoration: underline; }
        
        /* Footer Terminal */
        .footer {
            text-align: center; padding: 40px 20px; color: #666;
            font-family: 'Fira Code'; font-size: 0.9em;
            border-top: 1px solid #333; margin-top: 40px;
        }
        .terminal {
            background: #000; color: #00ff88; padding: 20px;
            border-radius: 10px; margin-top: 20px; font-family: 'Fira Code';
            border: 1px solid #00ff88; max-width: 600px; margin: 20px auto;
        }
        .prompt { color: #00ccff; }
        
        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2em; }
            .profile-img { width: 120px; height: 120px; }
            .music-section, .connect-section, .ops-section, .repo-section { margin: 20px; padding: 20px; }
        }
        
        /* Audio Controls (Optional) */
        .audio-controls {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 50px;
            border: 2px solid #00ff88; backdrop-filter: blur(10px);
            display: flex; gap: 10px; align-items: center;
        }
        .play-btn {
            width: 50px; height: 50px; border-radius: 50%;
            background: linear-gradient(45deg, #00ff88, #00ccff);
            border: none; cursor: pointer; font-size: 1.2em;
            transition: all 0.3s;
        }
        .play-btn:hover { transform: scale(1.1); box-shadow: 0 5px 20px rgba(0,255,136,0.5); }
    </style>
