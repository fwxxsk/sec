<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYE PERO MABAIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glow: 0 0 20px rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            font-family: 'Lexend', sans-serif;
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            background-color: #000000;
        }

        /* Starry Canvas Background */
        #star-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
        }

        .bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        /* Custom Cursor */
        .cursor-dot, .cursor-trail {
            position: fixed;
            top: 0; left: 0;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }

        .cursor-dot {
            width: 6px; height: 6px;
            background: #fff;
            box-shadow: 0 0 10px #fff;
        }

        .cursor-trail {
            width: 24px; height: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: width 0.2s, height 0.2s;
        }

        a:hover ~ .cursor-trail, .btn:hover ~ .cursor-trail {
            width: 40px; height: 40px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Entry Screen */
        #entry-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .click-text {
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: pulseText 2s infinite;
            color: #fff;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Main Content */
        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease 0.3s, transform 1s ease 0.3s;
        }

        .main-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Glass Profile Card */
        .profile-card {
            width: 100%;
            max-width: 380px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        /* Anime Avatar */
        .avatar-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 3px;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: var(--glow);
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background-color: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Typography */
        .name {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 12px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* Badges */
        .badges {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 0.5px;
            color: #ddd;
        }

        /* Links */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 400;
            transition: all 0.3s ease;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Custom Audio Player */
        .music-player {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            opacity: 0;
            transition: opacity 1s ease 0.6s;
            z-index: 100;
        }

        .music-player.visible {
            opacity: 1;
        }

        .audio-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 0.9rem;
            width: 100%;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .audio-controls i {
            font-size: 1.1rem;
            cursor: none;
            transition: color 0.3s ease;
        }

        .audio-controls i:hover {
            color: #a0a0a0;
        }

        .song-title {
            font-weight: 300;
            letter-spacing: 1px;
        }

    </style>
</head>
